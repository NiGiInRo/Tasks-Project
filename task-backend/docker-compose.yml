services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: task-backend-app
    working_dir: /app
    command: bash -lc "bundle install && bin/rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DATABASE: task_backend_development
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: task-backend-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  bundle_cache:
  mongo_data:
